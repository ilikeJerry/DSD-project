# P0 — deterministic server-side projection + Next production build (SSR compile gate).
name: hydration-runtime-gates
on:
  pull_request:
    paths:
      - "dsd/**"
      - ".github/workflows/hydration-runtime-gates.yml"
  push:
    branches: [main, master]
    paths:
      - "dsd/**"

defaults:
  run:
    working-directory: dsd

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hydration-runtime-gates:
    name: hydration-runtime-gates (P0)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: dsd/package-lock.json
      - run: npm ci
      - name: Projection determinism (Node; no flaky retries)
        run: npm run verify:projection-determinism 2>&1 | tee projection-determinism.log
      - name: Next.js production build (hydration compile gate)
        run: npm run web:build 2>&1 | tee next-build.log
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hydration-runtime-failure-${{ github.run_id }}
          path: |
            dsd/projection-determinism.log
            dsd/next-build.log
          retention-days: 14
