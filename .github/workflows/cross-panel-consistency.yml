# P0/P1 — cross-panel syncVersionKey + observability coherence.
name: cross-panel-consistency
on:
  pull_request:
    paths:
      - "dsd/packages/ui-safety/**"
      - "dsd/packages/clinical-runtime/**"
      - "dsd/package.json"
      - "dsd/package-lock.json"
      - ".github/workflows/cross-panel-consistency.yml"
  push:
    branches: [main, master]
    paths:
      - "dsd/packages/ui-safety/**"
      - "dsd/packages/clinical-runtime/**"
      - "dsd/package.json"
      - "dsd/package-lock.json"

defaults:
  run:
    working-directory: dsd

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cross-panel-consistency:
    name: cross-panel-consistency (P0/P1)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: dsd/package-lock.json
      - run: npm ci
      - run: npm run test:gate:cross-panel 2>&1 | tee cross-panel-gate.log
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cross-panel-failure-${{ github.run_id }}
          path: dsd/cross-panel-gate.log
          retention-days: 30
