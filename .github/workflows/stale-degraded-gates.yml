# P0 — stale visibility, degraded banners, critical visibility invariant.
name: stale-degraded-gates
on:
  pull_request:
    paths:
      - "dsd/packages/ui-safety/**"
      - "dsd/packages/clinical-runtime/**"
      - "dsd/package.json"
      - "dsd/package-lock.json"
      - ".github/workflows/stale-degraded-gates.yml"
  push:
    branches: [main, master]
    paths:
      - "dsd/packages/ui-safety/**"
      - "dsd/packages/clinical-runtime/**"
      - "dsd/package.json"
      - "dsd/package-lock.json"

defaults:
  run:
    working-directory: dsd

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  stale-degraded-gates:
    name: stale-degraded-gates (P0)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: dsd/package-lock.json
      - run: npm ci
      - run: npm run test:gate:stale-degraded 2>&1 | tee stale-degraded-gate.log
      - run: npm run test:gate:human-stable 2>&1 | tee human-stable-gate.log
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stale-degraded-failure-${{ github.run_id }}
          path: |
            dsd/stale-degraded-gate.log
            dsd/human-stable-gate.log
          retention-days: 30
